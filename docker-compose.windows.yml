#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# EVA Agent (Hermes fork). Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Binds native Windows home: %LOCALAPPDATA%\eva → /opt/data
#
# Usage (from repo root, no admin beyond Docker Desktop):
#   docker compose -f docker-compose.windows.yml up -d --build
#
# HERMES_HOME inside the container remains /opt/data (engine contract).
# On the host, EVA data lives under %LOCALAPPDATA%\eva.
#
services:
  gateway:
    build: .
    image: eva-agent:local
    container_name: eva
    restart: unless-stopped
    volumes:
      - ${LOCALAPPDATA}/eva:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
    command: ["gateway", "run"]

  dashboard:
    build: .
    image: eva-agent:local
    container_name: eva-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${LOCALAPPDATA}/eva:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      - HERMES_DASHBOARD_HOST=0.0.0.0
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
